<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Халява</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: Arial;
    color: white;
    flex-direction: column;
}

h1 {
    margin-bottom: 30px;
    font-size: 32px;
}

button {
    font-size: 28px;
    padding: 25px 60px;
    border: none;
    border-radius: 20px;
    background: #22c55e;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(34,197,94,0.6);
}

button:hover {
    transform: scale(1.1);
    background: #16a34a;
}
</style>
</head>

<body>

<h1>🎁 ХАЛЯВА</h1>

<button onclick="goToUser()">ХАЛЯВА</button>

<script>
function goToUser() {
    // открывает чат
    window.location.href = "https://t.me/lastlexore";
}
</script>

</body>
</html>
