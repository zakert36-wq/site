<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Shop</title>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
}

.shop {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
}

.card img {
    width: 100%;
    border-radius: 10px;
}
</style>

</head>
<body>

<h1 style="text-align:center;">🔥 Магазин аккаунтов</h1>

<div class="shop" id="shop"></div>

<script>
async function load() {
    let res = await fetch("https://site-production-f1b6.up.railway.app/products");
    let data = await res.json();

    let div = document.getElementById("shop");

    div.innerHTML = "";

    data.forEach(p => {
        div.innerHTML += `
        <div class="card">
            <img src="${p.photo}">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <b>${p.price} ₽</b>
        </div>
        `;
    });
}

load();
</script>

</body>
</html>
