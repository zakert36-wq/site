<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Халява</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
    overflow: hidden;
}

/* ГИФ ФОН */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://i.imgur.com/qqL2Did.gif") center/cover no-repeat;
    z-index: -2;
}

/* затемнение */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* карточка */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    animation: fadeIn 1s ease;
}

/* ГРАДИЕНТНЫЙ ТЕКСТ */
h1 {
    font-size: 34px;
    margin-bottom: 25px;

    background: linear-gradient(90deg, #ff00cc, #3333ff, #00ffff);
    background-size: 200% auto;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    animation: gradientMove 3s linear infinite;
}

/* КНОПКА */
button {
    font-size: 24px;
    padding: 20px 60px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(45deg, #ff00cc, #3333ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 25px rgba(255,0,200,0.6);
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(255,0,200,1);
}

button:active {
    transform: scale(0.95);
}

/* текст */
#text {
    margin-top: 20px;
    opacity: 0;
    transition: 0.4s;
}

.show {
    opacity: 1;
}

/* конфетти */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
    }
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.9);}
    to {opacity: 1; transform: scale(1);}
}

@keyframes gradientMove {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="card">
    <h1>🎁 ХАЛЯВА</h1>
    <button onclick="go()">ЗАБРАТЬ</button>
    <div id="text">Переход...</div>
</div>

<script>
function go() {
    document.getElementById("text").classList.add("show");

    for (let i = 0; i < 40; i++) {
        let div = document.createElement("div");
        div.className = "confetti";
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        div.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    setTimeout(() => {
        window.location.href = "https://t.me/lastlexore";
    }, 1000);
}
</script>

</body>
</html>
