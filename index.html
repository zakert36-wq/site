<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Халява</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    font-family: Arial;
    color: white;
    flex-direction: column;
    overflow: hidden;
}

h1 {
    font-size: 36px;
    margin-bottom: 30px;
    animation: fadeIn 1s ease;
}

button {
    font-size: 30px;
    padding: 25px 70px;
    border: none;
    border-radius: 20px;
    background: #22c55e;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 25px rgba(34,197,94,0.7);
}

button:hover {
    transform: scale(1.1);
    background: #16a34a;
}

#text {
    margin-top: 30px;
    font-size: 24px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

/* конфетти */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
    }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<h1>🎁 ХАЛЯВА</h1>

<button onclick="go()">ХАЛЯВА</button>

<div id="text">Переход в личку...</div>

<script>
function go() {
    // показать текст
    let text = document.getElementById("text");
    text.classList.add("show");

    // конфетти
    for (let i = 0; i < 40; i++) {
        let div = document.createElement("div");
        div.className = "confetti";
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = "hsl(" + Math.random()*360 + ",100%,50%)";
        div.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(div);

        setTimeout(() => div.remove(), 3000);
    }

    // задержка и переход
    setTimeout(() => {
        window.location.href = "https://t.me/lastlexore";
    }, 1000);
}
</script>

</body>
</html>
